<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; background: transparent; overflow: hidden; }
  </style>
</head>
<body>
  <div id="marquee-track" style="overflow:hidden;width:100%;">
    <div id="marquee-inner" style="display:flex;white-space:nowrap;">
      <img src="https://i.imgur.com/r1eE8pl.png" style="height:150px;margin-right:30px;border-radius:20px;">

      <img src="https://i.imgur.com/cIj7xBb.png" style="height:150px;margin-right:30px;border-radius:20px;">
      <img src="https://i.imgur.com/ugdgjoS.png" style="height:150px;margin-right:30px;border-radius:20px;">
    </div>
  </div>
  <script>
    var inner = document.getElementById('marquee-inner');
    var pos = 0;
    function scroll() {
      pos -= 1;
      if (pos <= -inner.scrollWidth / 2) pos = 0;
      inner.style.transform = 'translateX(' + pos + 'px)';
      requestAnimationFrame(scroll);
    }
    scroll();
  </script>
</body>
</html>
